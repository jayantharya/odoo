<!doctype html>
<html lang="en">

<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransitOps</title>
  <style>
    :root {
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-body);
    }

    .font-display {
      font-family: var(--font-display);
    }

    .font-plate {
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fade-in 0.35s ease-out;
    }

    @keyframes route-pulse {
      0% {
        stroke-dashoffset: 24;
      }

      100% {
        stroke-dashoffset: 0;
      }
    }

    .route-line {
      animation: route-pulse 1.1s linear infinite;
    }

    @media (prefers-reduced-motion: reduce) {

      .animate-fade-in,
      .route-line {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
